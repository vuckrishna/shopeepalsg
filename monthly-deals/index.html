<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gadget WiFi SG</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary" data-menu-open="false">
        <a class="brand" href="/index.html" aria-label="Gadget Wi Fi Home">
          <span class="logo" aria-hidden="true">
            <img
              class="logo-image"
              src="/assets/gwlogo5edit.png"
              alt="Gadget WiFi Logo"
            />
          </span>
        </a>
        <div class="nav-search" role="search">
          <span class="search-icon" aria-hidden="true">
            <!-- <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"></circle>
            <path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg> -->
          </span>
          <input
            class="search-input"
            type="search"
            placeholder="Search products..."
            aria-label="Search products"
          />
        </div>
        <button
          class="nav-toggle"
          aria-controls="primary-navigation"
          aria-expanded="false"
          type="button"
        >
          <span class="nav-toggle-box" aria-hidden="true">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
          </span>
          <span class="sr-only">Menu</span>
        </button>
        <ul id="primary-navigation" class="nav-links">
          <li><a href="/deals/index.html">Deals</a></li>
          <li>
            <a href="/monthly-deals/index.html" aria-current="page"
              >Monthly Deals</a
            >
          </li>
          <li><a href="/index.html#contact">Contact</a></li>
          <li><a href="/index.html#blogs">Blogs</a></li>
        </ul>
      </nav>
    </header>

    <main class="deals-page monthly-page">
      <p class="deals-no-results" id="monthly-no-results" style="display: none">
        No products match your search.
      </p>
      <section class="deals-grid-section" data-monthly-section="0">
        <div class="section-heading">
          <span class="monthly-label"></span>
        </div>
        <p class="monthly-summary" data-monthly-summary></p>
        <div
          class="products-grid deals-grid"
          data-fetch-monthly="monthlydeals.json"
        ></div>
      </section>

      <section class="deals-grid-section" data-monthly-section="1">
        <div class="section-heading">
          <span class="monthly-label"></span>
        </div>
        <div
          class="products-grid deals-grid"
          data-fetch-monthly="monthlydeals.json"
        ></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div class="footer-brand">
          <img
            src="./assets/gwlogo2-edited2.png"
            alt="Gadget WiFi logo"
            class="footer-logo"
          />
          <p>Your smart companion for snagging the sweetest Shopee deals.</p>
        </div>
        <div class="footer-links">
          <span class="footer-heading">Quick Links</span>
          <a href="/deals/index.html">Deals</a>
          <a href="/monthly-deals/index.html">Monthly Deals</a>
          <a href="/index.html#about">About</a>
          <a href="/index.html#blogs">Blogs</a>
        </div>
        <div class="footer-contact">
          <span class="footer-heading">Stay in touch</span>
          <a href="mailto:hello@shopeepal.com">hello@shopeepal.com</a>
          <p>Made with ❤️ in Singapore</p>
        </div>
      </div>
      <div class="footer-bottom">
        <span
          >&copy; <span id="current-year"></span> ShopeePal. All rights
          reserved.</span
        >
      </div>
    </footer>

    <script src="/script.js"></script>
  </body>
</html>
